<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Tagihan Listrik - Syalfa Oktifa Nanda</title>
    <link rel="stylesheet" href="KalkukatorTagihanListrik.css">
</head>
<body>
    <div class="container">
        <!-- Header dengan Nama & NIM -->
        <div class="header">
            <h1>Kalkulator Listrik</h1>
            <div class="info">
                <p><strong>SYALFA OKTIFA NANDA</strong></p>
                <p>NIM: <strong>23051430023</strong></p>
            </div>
        </div>
        
        <div class="input-group">
            <label>Daya (Watt)</label>
            <input type="number" id="daya" placeholder="1300" min="0">
        </div>
        
        <div class="input-group">
            <label>Jam/hari</label>
            <input type="number" id="jam" placeholder="5" min="0" step="0.1">
        </div>
        
        <div class="result" id="result">
            <h3 id="kwh">0 kWh</h3>
            <p id="biaya">Rp 0</p>
        </div>
    </div>

    <script src="KalkulatorTagihanListrik.js"></script>
</body>
</html>
