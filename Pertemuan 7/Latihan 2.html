<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATIHAN 2 - Sortir Jumlah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <!-- Header dengan Nama dan NIM -->
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="text-center text-primary mb-0">SYALFA OKTIFA NANDA</h1>
            <h5 class="text-center text-muted">NIM: 23051430023</h5>
        </div>
    </div>

    <h2 class="text-center text-success mb-4">LATIHAN 2: SORTIR JUMLAH PRODUKSI</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Input Data</div>
                <div class="card-body">
                    <form id="formProduksi">
                        <div class="mb-3"><label>Tanggal</label><input type="date" id="tanggal" class="form-control"
                                required></div>
                        <div class="mb-3"><label>Operator</label><input type="text" id="operator" class="form-control"
                                required></div>
                        <div class="mb-3"><label>Shift</label>
                            <select id="shift" class="form-select">
                                <option value="Pagi">Pagi</option>
                                <option value="Siang">Siang</option>
                                <option value="Malam">Malam</option>
                            </select>
                        </div>
                        <div class="mb-3"><label>Jumlah</label><input type="number" id="jumlah" class="form-control"
                                min="1" required></div>
                        <button type="submit" class="btn btn-primary w-100">Simpan</button>
                        <button type="button" id="btnHapusSemua" class="btn btn-danger w-100 mt-2">Hapus Semua</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <!-- LATIHAN 2: SORT BUTTON -->
                <div class="card-header d-flex justify-content-between">
                    <h5>📋 Riwayat Produksi</h5>
                    <button id="btnSortJumlah" class="btn btn-sm btn-outline-success">
                        📊 Sortir Jumlah Terbesar
                    </button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-bordered table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Tanggal</th>
                                <th>Operator</th>
                                <th>Shift</th>
                                <th>Jumlah</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="Latihan 2.js"></script>
</body>

</html>
