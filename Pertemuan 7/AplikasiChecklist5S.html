<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Audit 5S - SYALFA OKTIFA NANDA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <!-- Header dengan Nama dan NIM -->
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="text-center text-primary mb-0">SYALFA OKTIFA NANDA</h1>
            <h5 class="text-center text-muted">NIM: 23051430023</h5>
        </div>
    </div>

    <h2 class="text-center text-success mb-4">
        <i class="bi bi-check2-circle"></i> APLIKASI AUDIT 5S
    </h2>
    <p class="text-center text-muted mb-5">
        Seiri • Seiton • Seiso • Seiketsu • Shitsuke
    </p>

    <div class="row">
        <!-- Kolom Kiri: Form Checklist 5S -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5><i class="bi bi-clipboard-check"></i> Form Audit 5S</h5>
                </div>
                <div class="card-body">
                    <form id="form5S">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Auditor</label>
                            <input type="text" id="auditor" class="form-control" placeholder="Nama Lengkap Auditor"
                                required>
                        </div>

                        <div class="mb-4">
                            <h6 class="fw-bold text-primary mb-3">📋 Checklist 5S:</h6>

                            <!-- 1. SEIRI -->
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="seiri">
                                <label class="form-check-label fw-semibold" for="seiri">
                                    <i class="bi bi-1-circle text-danger"></i> SEIRI (Penyisihan)
                                </label>
                            </div>

                            <!-- 2. SEITON -->
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="seiton">
                                <label class="form-check-label fw-semibold" for="seiton">
                                    <i class="bi bi-2-circle text-warning"></i> SEITON (Penataan)
                                </label>
                            </div>

                            <!-- 3. SEISO -->
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="seiso">
                                <label class="form-check-label fw-semibold" for="seiso">
                                    <i class="bi bi-3-circle text-info"></i> SEISO (Pembersihan)
                                </label>
                            </div>

                            <!-- 4. SEIKETSU -->
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="seiketsu">
                                <label class="form-check-label fw-semibold" for="seiketsu">
                                    <i class="bi bi-4-circle text-success"></i> SEIKETSU (Standarisasi)
                                </label>
                            </div>

                            <!-- 5. SHITSUKE -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="shitsuke">
                                <label class="form-check-label fw-semibold" for="shitsuke">
                                    <i class="bi bi-5-circle text-purple"></i> SHITSUKE (Disiplin)
                                </label>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-8">
                                <div id="skorPreview" class="alert alert-info">Skor: 0%</div>
                            </div>
                            <div class="col-4">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-save"></i> Simpan Audit
                                </button>
                            </div>
                        </div>

                        <button type="button" id="btnHapusSemua" class="btn btn-danger w-100">
                            <i class="bi bi-trash"></i> Hapus Semua Data
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Tabel Riwayat -->
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h5><i class="bi bi-table"></i> Riwayat Audit 5S</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th><i class="bi bi-calendar"></i> Tanggal</th>
                                <th><i class="bi bi-person"></i> Auditor</th>
                                <th><i class="bi bi-graph-up"></i> Skor</th>
                                <th><i class="bi bi-clipboard-data"></i> Detail</th>
                                <th><i class="bi bi-gear"></i> Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody">
                            <!-- Data dari LocalStorage -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="AplikasiChecklist5S.js"></script>
</body>

</html>
